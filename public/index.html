<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Play Literature card game with UNO cards. Online multiplayer, AI bots, pass-device mode." />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Literature" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph for link sharing -->
    <meta property="og:title" content="Literature — UNO Card Game" />
    <meta property="og:description" content="Play Literature with friends! Share a room code and play from anywhere." />
    <meta property="og:type" content="website" />

    <title>Literature — UNO Edition</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0f0f1a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>You need JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
